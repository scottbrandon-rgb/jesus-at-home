<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2b5ba5">
  <title>Send Update — Jesus at Home</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Hanken+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="admin-page">

  <header class="site-header">
    <a href="/" class="wordmark" aria-label="Harrison Faith Youth — home">
      <img class="mark" src="logo-mark.png" alt="" width="40" height="40">
      <span class="name">Harrison Faith Youth</span>
    </a>
  </header>

  <main>
    <div class="admin-main">
      <h2>Send a Text Update</h2>

      <form id="broadcast-form" novalidate>
        <label for="password">Admin Password</label>
        <input type="password" id="password" required placeholder="Enter staff password">

        <label for="message">
          Message
          <span class="char-count" id="char-count">0 / 160</span>
        </label>
        <textarea id="message" required rows="5" maxlength="320"
          placeholder="Type your message here. Keep it under 160 characters to avoid splitting into multiple texts."></textarea>

        <div id="preview" class="message-preview" aria-label="Message preview"></div>

        <button type="submit" id="send-btn">Send to All Subscribers</button>
      </form>

      <div id="result" class="result" role="alert" aria-live="polite"></div>
    </div>
  </main>

  <script>
    const textarea  = document.getElementById('message');
    const charCount = document.getElementById('char-count');
    const preview   = document.getElementById('preview');

    textarea.addEventListener('input', () => {
      const len = textarea.value.length;
      charCount.textContent = `${len} / 160`;
      charCount.style.color = len > 160 ? '#f7c9c4' : '';
      preview.textContent = textarea.value || '';
    });

    document.getElementById('broadcast-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn    = document.getElementById('send-btn');
      const result = document.getElementById('result');
      btn.disabled = true;
      btn.textContent = 'Sending…';
      result.className = 'result';

      try {
        const res = await fetch('/.netlify/functions/broadcast', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            password: document.getElementById('password').value,
            message: textarea.value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          result.className = 'result success';
          result.textContent = `Sent to ${data.sent} subscriber${data.sent !== 1 ? 's' : ''}` +
            (data.errors ? ` — ${data.errors} failed.` : '.');
          textarea.value = '';
          charCount.textContent = '0 / 160';
          charCount.style.color = '';
          preview.textContent = '';
        } else {
          result.className = 'result error';
          result.textContent = data.error || 'Failed to send. Check your password and try again.';
        }
      } catch {
        result.className = 'result error';
        result.textContent = 'Network error. Please try again.';
      }

      btn.disabled = false;
      btn.textContent = 'Send to All Subscribers';
    });
  </script>
</body>
</html>
